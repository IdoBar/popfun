# Save as: assets/multiqc_config.yaml

title: "PopFun"
subtitle: "Population-Scale Fungal Variant Calling Pipeline"
report_comment: "Automated QC, Alignment and Variant Calling Report"

# Keep output paths deterministic for Nextflow output matching
data_dir_name: "multiqc_data"

# Order the report logically from reads -> alignments -> variants
module_order:
  - fastp
  - fastqc
  - trimmomatic
  - picard
  - sambamba
  - qualimap
  - bcftools

# Clean up tool extensions so the report labels are easy to read
extra_fn_clean_exts:
  - '.fastp'
  - '_qualimap'
  - '.dedup'
  - '.vcf'
  - '.stats'
  - '_discordance'

# Customize the BCFtools section to clearly separate raw vs filtered VCFs
bcftools:
  collapse_complementary_skips: true
  
# Customize Picard MarkDuplicates
picard_config:
  markduplicates_keep_name: false

# Customize logo settings
custom_logo: "popfun.png"  # filename only — staged alongside this config in the process work directory
# custom_logo_dark: "/abs/path/to/logo-for-dark-mode.png"
custom_logo_url: "https://github.com/IdoBar/popfun"
custom_logo_title: "Population-Scale Fungal Variant Calling Pipeline"
custom_logo_width: 200 # Width in pixels